<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ADVR News Preview</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #232323;
    --panel-alt: #2a2a2a;
    --border: #3a3a3a;
    --text: #e6e6e6;
    --muted: #a0a0a0;
    --yellow: #DBD700;
    --hotfix: #6a3030;
    --danger: #c75454;
    --ok: #76b67a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
  header {
    padding: 16px 24px;
    background: #111;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { margin: 0; font-size: 18px; color: var(--yellow); }
  header .info { color: var(--muted); font-size: 13px; }
  main {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 57px);
  }
  #cards {
    overflow-y: auto;
    padding: 16px;
    border-right: 1px solid var(--border);
    background: var(--panel);
  }
  .card {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .card:hover { border-color: var(--yellow); }
  .card.active { border-color: var(--yellow); background: #2f2f2f; }
  .card.hotfix { background: var(--hotfix); }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #000;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .card-title { font-weight: 600; font-size: 15px; margin: 0 0 4px 0; }
  .card-date { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .card-desc { color: #ccc; font-size: 13px; line-height: 1.4; }
  #detailPane {
    overflow-y: auto;
    padding: 24px 48px 40px;
    max-width: 1040px;
  }
  #detail {
    padding-top: 8px;
  }
  #detail h1, #detail h2, #detail h3 { color: var(--text); }
  #detail h1 { font-size: 28px; }
  #detail h2 { font-size: 22px; margin-top: 28px; }
  #detail h3 { font-size: 18px; margin-top: 22px; }
  #detail img { max-width: 80%; height: auto; display: block; margin: 16px auto; border-radius: 4px; }
  #detail video { max-width: 80%; height: auto; display: block; margin: 16px auto; border-radius: 4px; background: #000; }
  #detail ul { padding-left: 24px; }
  #detail li { margin: 4px 0; }
  #detail p { line-height: 1.55; }
  .placeholder { color: var(--muted); font-style: italic; padding: 32px; }
  .error { color: #ff6a6a; padding: 32px; }
  .hidden { display: none !important; }
  .editor {
    border: 1px solid var(--border);
    background: #202020;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .editor-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }
  .editor h2 { margin: 0; font-size: 16px; color: var(--yellow); }
  .editor-status { color: var(--muted); font-size: 12px; min-height: 18px; text-align: right; }
  .editor-status.ok { color: var(--ok); }
  .editor-status.error { color: #ff8a8a; padding: 0; }
  .form-grid { display: grid; grid-template-columns: minmax(0, 1fr) 160px; gap: 12px; }
  label { display: block; color: var(--muted); font-size: 12px; font-weight: 600; }
  input, textarea, select {
    width: 100%;
    margin-top: 5px;
    border: 1px solid var(--border);
    background: #151515;
    color: var(--text);
    border-radius: 4px;
    padding: 8px 10px;
    font: inherit;
  }
  textarea { min-height: 68px; resize: vertical; }
  input[type="file"] { padding: 7px; }
  input:focus, textarea:focus, select:focus { outline: 1px solid var(--yellow); border-color: var(--yellow); }
  .thumbnail-tools {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(220px, .55fr);
    gap: 10px;
    align-items: end;
    margin-top: 10px;
  }
  .thumbnail-preview {
    width: 164px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-top: 10px;
  }
  .checks { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 12px; }
  .check { display: inline-flex; align-items: center; gap: 8px; color: var(--text); font-weight: 500; }
  .check input { width: auto; margin: 0; }
  .actions { display: flex; gap: 10px; margin-top: 16px; }
  button {
    border: 1px solid var(--border);
    background: #303030;
    color: var(--text);
    border-radius: 4px;
    padding: 8px 12px;
    font: inherit;
    cursor: pointer;
  }
  button:hover { border-color: var(--yellow); }
  button.primary { background: #3a3a16; border-color: #716f10; color: #f1ef7a; }
  button.danger { background: #3b1f1f; border-color: var(--danger); color: #ffb2b2; }
  button:disabled { opacity: .5; cursor: default; }
  .audit-summary { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .audit-summary.ok { color: var(--ok); }
  .audit-summary.error { color: #ff8a8a; }
  .audit-list { display: grid; gap: 8px; max-height: 260px; overflow-y: auto; }
  .audit-item {
    display: grid;
    grid-template-columns: 86px minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    border: 1px solid var(--border);
    background: #181818;
    border-radius: 5px;
    padding: 8px;
  }
  .audit-item img {
    width: 86px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #000;
    border-radius: 3px;
  }
  .audit-title { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
  .audit-meta { color: var(--muted); font-size: 12px; }
  .crop-preview-panel {
    border: 1px solid var(--border);
    background: #181818;
    border-radius: 6px;
    padding: 14px;
    margin-top: 12px;
  }
  .crop-preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .crop-preview-grid span { display: block; color: var(--muted); font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .crop-preview-grid img {
    width: 100%;
    height: auto;
    max-height: 240px;
    object-fit: contain;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .crop-meta { color: var(--muted); font-size: 12px; margin-top: 10px; }
  @media (max-width: 980px) {
    main { grid-template-columns: 1fr; height: auto; }
    #cards { max-height: 46vh; border-right: 0; border-bottom: 1px solid var(--border); }
    #detailPane { padding: 20px; }
    .form-grid, .thumbnail-tools { grid-template-columns: 1fr; }
    .audit-item { grid-template-columns: 72px minmax(0, 1fr); }
    .audit-item button { grid-column: 1 / -1; }
    .crop-preview-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>ADVR News Preview</h1>
  <span class="info">Local emulation of the in-game news board. Click a card to view its article.</span>
</header>
<main>
  <div id="cards"><div class="placeholder">Loading news index…</div></div>
  <div id="detailPane">
    <section id="thumbnailAudit" class="editor">
      <div class="editor-head">
        <h2>Thumbnail warnings</h2>
        <div class="actions" style="margin-top:0">
          <button id="scanThumbnailsButton" type="button">Scan thumbnails</button>
        </div>
      </div>
      <div id="thumbnailAuditStatus" class="audit-summary">Scan thumbnails to find images that are not 16:9.</div>
      <div id="thumbnailAuditList" class="audit-list"></div>
      <div id="cropPreviewPanel" class="crop-preview-panel hidden">
        <div class="editor-head">
          <h2 id="cropPreviewTitle">Crop preview</h2>
          <button id="closeCropPreviewButton" type="button">Close</button>
        </div>
        <div class="crop-preview-grid">
          <div>
            <span>Current thumbnail</span>
            <img id="cropOriginalImage" alt="">
          </div>
          <div>
            <span>Center crop to 16:9</span>
            <img id="cropResultImage" alt="">
          </div>
        </div>
        <div id="cropPreviewMeta" class="crop-meta"></div>
        <div class="actions">
          <button id="applyCropButton" class="primary" type="button">Apply crop</button>
        </div>
      </div>
    </section>
    <section id="editor" class="editor hidden">
      <div class="editor-head">
        <h2>Edit selected post</h2>
        <div id="editorStatus" class="editor-status"></div>
      </div>
      <form id="editForm">
        <div class="form-grid">
          <label>Title
            <input id="editTitle" type="text" required>
          </label>
          <label>Date
            <input id="editDate" type="date" required>
          </label>
        </div>
        <label>Description
          <textarea id="editDescription"></textarea>
        </label>
        <label>Thumbnail URL
          <input id="editThumbnail" type="text">
        </label>
        <div class="thumbnail-tools">
          <label>Article images
            <select id="thumbnailAssets"></select>
          </label>
          <button id="useAssetButton" type="button">Use selected</button>
          <label>Upload thumbnail
            <input id="thumbnailFile" type="file" accept="image/*">
          </label>
        </div>
        <img id="thumbnailPreview" class="thumbnail-preview hidden" alt="">
        <div class="checks">
          <label class="check"><input id="updateArticleHeading" type="checkbox">Update first article heading</label>
          <label class="check"><input id="archiveFolder" type="checkbox" checked>Move removed folder to _removed_posts</label>
        </div>
        <div class="actions">
          <button id="saveButton" class="primary" type="submit">Save changes</button>
          <button id="removeButton" class="danger" type="button">Remove post</button>
        </div>
      </form>
    </section>
    <div id="detail"><div class="placeholder">Select an article on the left.</div></div>
  </div>
</main>
<script>
const RAW_PREFIX = 'https://raw.githubusercontent.com/erthu-games/advr-news/refs/heads/master/news/';
let newsEntries = [];
let activeEntry = null;
let activeCardEl = null;
let thumbnailAuditItems = [];
let activeCropItem = null;
const thumbnailCacheBust = new Map();

// Strip the github raw prefix so URLs become relative to this HTML's location.
function localize(url) {
  if (!url) return url;
  if (url.startsWith(RAW_PREFIX)) return url.substring(RAW_PREFIX.length);
  return url;
}

function thumbnailSrc(url) {
  const src = localize(url);
  const version = thumbnailCacheBust.get(url);
  if (!src || !version) return src;
  return src + (src.includes('?') ? '&' : '?') + 'v=' + version;
}

function apiUrl(path) {
  return path.replace(/^\/+/, '');
}

async function apiGet(path) {
  const res = await fetch(apiUrl(path));
  const body = await res.json().catch(() => null);
  if (!res.ok || !body || body.ok === false) {
    throw new Error((body && body.error) || `HTTP ${res.status}`);
  }
  return body;
}

async function apiPost(path, payload) {
  const res = await fetch(apiUrl(path), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const body = await res.json().catch(() => null);
  if (!res.ok || !body || body.ok === false) {
    throw new Error((body && body.error) || `HTTP ${res.status}`);
  }
  return body;
}

function parseNewsIndex(text) {
  const entries = [];
  const blocks = text.split(/^---\s*$/m);
  for (const block of blocks) {
    const trimmed = block.trim();
    if (!trimmed) continue;
    const entry = { title: '', date: '', description: '', thumbnail: '', path: '' };
    for (const rawLine of trimmed.split(/\r?\n/)) {
      const line = rawLine.trim();
      if      (/^TITLE:/i.test(line))       entry.title       = line.slice(6).trim();
      else if (/^DATE:/i.test(line))        entry.date        = line.slice(5).trim();
      else if (/^DESCRIPTION:/i.test(line)) entry.description = line.slice(12).trim();
      else if (/^THUMBNAIL:/i.test(line))   entry.thumbnail   = line.slice(10).trim();
      else if (/^PATH:/i.test(line))        entry.path        = line.slice(5).trim();
    }
    if (entry.title) entries.push(entry);
  }
  return entries;
}

function isHotfix(entry) {
  return /^hotfix/i.test(entry.title.trim()) || /hotfix_/i.test(entry.path);
}

function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

// Convert TMP-style rich text + a markdown subset to HTML, mirroring InGameNews.cs ParseAndDisplay.
function renderInline(text) {
  let s = escapeHtml(text);
  // TMP tags were escaped above; un-escape the supported subset.
  s = s.replace(/&lt;(\/?)(b|i|u|s)&gt;/g, '<$1$2>');
  s = s.replace(/&lt;color=(#[0-9a-fA-F]{3,8})&gt;/g, '<span style="color:$1">');
  s = s.replace(/&lt;\/color&gt;/g, '</span>');
  return s;
}

function renderMarkdown(md, baseDir) {
  const lines = md.split(/\r?\n/);
  let html = '';
  let listOpen = false;
  let paraBuf = [];

  const flushPara = () => {
    if (paraBuf.length === 0) return;
    html += `<p>${paraBuf.map(renderInline).join('<br>')}</p>`;
    paraBuf = [];
  };
  const closeList = () => {
    if (listOpen) { html += '</ul>'; listOpen = false; }
  };

  const imgRe = /^!\[.*?\]\((.*?)\)\s*$/;
  const h1ColorRe = /^##\s+<color=(#[0-9a-fA-F]{3,8})>(.*?)<\/color>\s*$/;

  for (const raw of lines) {
    const line = raw.replace(/\r$/, '');

    // Image / video — full line
    const imgMatch = line.match(imgRe);
    if (imgMatch) {
      flushPara(); closeList();
      let src = imgMatch[1].trim();
      if (!src) continue;
      if (!/^https?:/i.test(src)) src = baseDir + src;
      else src = localize(src);
      if (/\.mp4($|\?)/i.test(src)) {
        html += `<video src="${escapeAttr(src)}" autoplay loop muted playsinline></video>`;
      } else {
        html += `<img src="${escapeAttr(src)}" alt="">`;
      }
      continue;
    }

    // H1-as-yellow-h2 (## <color=#DBD700>title</color>)
    const h1m = line.match(h1ColorRe);
    if (h1m) {
      flushPara(); closeList();
      html += `<h1 style="color:${h1m[1]}">${renderInline(h1m[2])}</h1>`;
      continue;
    }

    if (line.startsWith('### ')) {
      flushPara(); closeList();
      html += `<h3>${renderInline(line.slice(4).trim())}</h3>`;
      continue;
    }
    if (line.startsWith('## ')) {
      flushPara(); closeList();
      html += `<h2>${renderInline(line.slice(3).trim())}</h2>`;
      continue;
    }
    if (line.startsWith('- ')) {
      flushPara();
      if (!listOpen) { html += '<ul>'; listOpen = true; }
      html += `<li>${renderInline(line.slice(2).trim())}</li>`;
      continue;
    }
    if (line.trim() === '') {
      flushPara(); closeList();
      continue;
    }
    // Body line — accumulate into a paragraph
    closeList();
    paraBuf.push(line);
  }

  flushPara(); closeList();
  return html;
}

function getBaseDir(url) {
  const i = url.lastIndexOf('/');
  return i >= 0 ? url.substring(0, i + 1) : '';
}

function setEditorStatus(message, type = '') {
  const status = document.getElementById('editorStatus');
  status.textContent = message || '';
  status.className = 'editor-status' + (type ? ` ${type}` : '');
}

function getArticleDirectory(entry) {
  return getBaseDir(localize(entry.path));
}

function normalizeThumbnailInput(value) {
  const trimmed = value.trim();
  if (!trimmed || /^https?:/i.test(trimmed)) return trimmed;
  const relative = trimmed.includes('/') ? trimmed.replace(/^\/+/, '') : getArticleDirectory(activeEntry) + trimmed;
  return RAW_PREFIX + relative;
}

function updateThumbnailPreview() {
  const preview = document.getElementById('thumbnailPreview');
  const inputValue = document.getElementById('editThumbnail').value.trim();
  const file = document.getElementById('thumbnailFile').files[0];

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
    return;
  }

  if (!inputValue) {
    preview.classList.add('hidden');
    preview.removeAttribute('src');
    return;
  }

  preview.src = thumbnailSrc(normalizeThumbnailInput(inputValue));
  preview.classList.remove('hidden');
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error('Failed to read file.'));
    reader.readAsDataURL(file);
  });
}

async function loadThumbnailAssets(entry) {
  const select = document.getElementById('thumbnailAssets');
  select.disabled = true;
  select.innerHTML = '<option value="">Loading...</option>';

  try {
    const body = await apiGet(`api/assets?path=${encodeURIComponent(entry.path)}`);
    const assets = body.assets || [];
    if (assets.length === 0) {
      select.innerHTML = '<option value="">No article images found</option>';
      return;
    }

    select.innerHTML = '<option value="">Choose an image...</option>';
    for (const asset of assets) {
      const option = document.createElement('option');
      option.value = asset.url;
      option.textContent = asset.name;
      if (localize(asset.url) === localize(entry.thumbnail)) option.selected = true;
      select.appendChild(option);
    }
    select.disabled = false;
  } catch (e) {
    select.innerHTML = '<option value="">Start news_preview_server.ps1 for editing</option>';
    setEditorStatus(`Editing unavailable: ${e.message}`, 'error');
  }
}

function populateEditor(entry) {
  document.getElementById('editor').classList.remove('hidden');
  document.getElementById('editTitle').value = entry.title || '';
  document.getElementById('editDate').value = entry.date || '';
  document.getElementById('editDescription').value = entry.description || '';
  document.getElementById('editThumbnail').value = entry.thumbnail || '';
  document.getElementById('thumbnailFile').value = '';
  document.getElementById('updateArticleHeading').checked = false;
  document.getElementById('archiveFolder').checked = true;
  setEditorStatus('');
  updateThumbnailPreview();
  loadThumbnailAssets(entry);
}

async function renderArticle(entry) {
  const detail = document.getElementById('detail');
  detail.innerHTML = '<div class="placeholder">Loading article...</div>';

  const articleUrl = localize(entry.path);
  try {
    const res = await fetch(articleUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    const baseDir = getBaseDir(articleUrl);
    detail.innerHTML = renderMarkdown(md, baseDir);
    document.getElementById('detailPane').scrollTop = 0;
  } catch (e) {
    detail.innerHTML = `<div class="error">Failed to load ${escapeHtml(articleUrl)}: ${escapeHtml(e.message)}</div>`;
  }
}

async function loadArticle(entry, cardEl) {
  if (activeCardEl) activeCardEl.classList.remove('active');
  cardEl.classList.add('active');
  activeCardEl = cardEl;
  activeEntry = entry;

  populateEditor(entry);
  await renderArticle(entry);
}

function populateCard(el, entry) {
  el.className = 'card' + (isHotfix(entry) ? ' hotfix' : '');
  const thumbSrc = thumbnailSrc(entry.thumbnail);
  let thumbHtml = '';
  if (thumbSrc && !isHotfix(entry)) {
    thumbHtml = `<img class="card-thumb" src="${escapeAttr(thumbSrc)}" loading="lazy" alt="">`;
  }
  el.innerHTML = `
    ${thumbHtml}
    <div class="card-title">${escapeHtml(entry.title)}</div>
    <div class="card-date">${escapeHtml(formatDate(entry.date))}</div>
    ${entry.description ? `<div class="card-desc">${escapeHtml(entry.description)}</div>` : ''}
  `;
}

function setThumbnailAuditStatus(message, type = '') {
  const status = document.getElementById('thumbnailAuditStatus');
  status.textContent = message || '';
  status.className = 'audit-summary' + (type ? ` ${type}` : '');
}

function hideCropPreview() {
  activeCropItem = null;
  document.getElementById('cropPreviewPanel').classList.add('hidden');
  document.getElementById('cropOriginalImage').removeAttribute('src');
  document.getElementById('cropResultImage').removeAttribute('src');
}

function renderThumbnailAuditItems(items) {
  const list = document.getElementById('thumbnailAuditList');
  list.innerHTML = '';

  if (items.length === 0) {
    list.innerHTML = '<div class="placeholder" style="padding:12px">All indexed thumbnails with local files are 16:9.</div>';
    return;
  }

  for (const item of items) {
    const el = document.createElement('div');
    el.className = 'audit-item';

    const imgSrc = thumbnailSrc(item.thumbnail);
    const dimensions = item.width && item.height
      ? `${item.width} x ${item.height} -> ${item.cropWidth} x ${item.cropHeight}`
      : item.issue;
    const buttonHtml = item.canCrop
      ? '<button type="button">Preview crop</button>'
      : '<button type="button" disabled>Cannot crop</button>';

    el.innerHTML = `
      ${imgSrc ? `<img src="${escapeAttr(imgSrc)}" alt="">` : '<div></div>'}
      <div>
        <div class="audit-title">${escapeHtml(item.title)}</div>
        <div class="audit-meta">${escapeHtml(dimensions)}</div>
        <div class="audit-meta">${escapeHtml(item.issue)}</div>
      </div>
      ${buttonHtml}
    `;

    const button = el.querySelector('button');
    if (item.canCrop) button.addEventListener('click', () => showCropPreview(item));
    list.appendChild(el);
  }
}

async function scanThumbnailAudit() {
  const button = document.getElementById('scanThumbnailsButton');
  button.disabled = true;
  hideCropPreview();
  setThumbnailAuditStatus('Scanning thumbnails...');
  document.getElementById('thumbnailAuditList').innerHTML = '';

  try {
    const result = await apiGet('api/thumbnail-audit');
    thumbnailAuditItems = result.items || [];
    const croppable = thumbnailAuditItems.filter(item => item.canCrop).length;
    setThumbnailAuditStatus(`${thumbnailAuditItems.length} thumbnail warning${thumbnailAuditItems.length === 1 ? '' : 's'} found. ${croppable} can be center-cropped automatically.`);
    renderThumbnailAuditItems(thumbnailAuditItems);
  } catch (error) {
    setThumbnailAuditStatus(`Scan failed: ${error.message}`, 'error');
  } finally {
    button.disabled = false;
  }
}

function showCropPreview(item) {
  activeCropItem = item;
  const previewUrl = `api/thumbnail-crop-preview?thumbnail=${encodeURIComponent(item.thumbnail)}&v=${Date.now()}`;
  document.getElementById('cropPreviewTitle').textContent = item.title;
  document.getElementById('cropOriginalImage').src = thumbnailSrc(item.thumbnail);
  document.getElementById('cropResultImage').src = previewUrl;
  document.getElementById('cropPreviewMeta').textContent = `${item.width} x ${item.height} will become ${item.cropWidth} x ${item.cropHeight}. The crop is centered.`;
  document.getElementById('cropPreviewPanel').classList.remove('hidden');
  document.getElementById('cropPreviewPanel').scrollIntoView({ block: 'nearest' });
}

async function applyActiveCrop() {
  if (!activeCropItem) return;
  const button = document.getElementById('applyCropButton');
  button.disabled = true;
  setThumbnailAuditStatus('Applying crop...');

  try {
    const result = await apiPost('api/crop-thumbnail', { thumbnail: activeCropItem.thumbnail });
    thumbnailCacheBust.set(activeCropItem.thumbnail, Date.now());

    if (activeEntry && activeEntry.thumbnail === activeCropItem.thumbnail) {
      updateThumbnailPreview();
    }
    renderCards(newsEntries, activeEntry);
    thumbnailAuditItems = thumbnailAuditItems.filter(item => item !== activeCropItem);
    hideCropPreview();
    renderThumbnailAuditItems(thumbnailAuditItems);
    setThumbnailAuditStatus(`Cropped thumbnail to ${result.width} x ${result.height}.`, 'ok');
  } catch (error) {
    setThumbnailAuditStatus(`Crop failed: ${error.message}`, 'error');
  } finally {
    button.disabled = false;
  }
}

function renderCards(entries, selectedEntry = activeEntry) {
  newsEntries = entries;
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  for (const entry of entries) {
    const el = document.createElement('div');
    el.tabIndex = 0;
    el.setAttribute('role', 'button');
    populateCard(el, entry);
    if (entry === selectedEntry) {
      el.classList.add('active');
      activeCardEl = el;
    }
    el.addEventListener('click', () => loadArticle(entry, el));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        loadArticle(entry, el);
      }
    });
    cards.appendChild(el);
  }
}

async function saveActiveEntry(e) {
  e.preventDefault();
  if (!activeEntry) return;

  const saveButton = document.getElementById('saveButton');
  saveButton.disabled = true;
  setEditorStatus('Saving...');

  try {
    const file = document.getElementById('thumbnailFile').files[0];
    const payload = {
      originalPath: activeEntry.path,
      title: document.getElementById('editTitle').value,
      date: document.getElementById('editDate').value,
      description: document.getElementById('editDescription').value,
      thumbnail: normalizeThumbnailInput(document.getElementById('editThumbnail').value),
      updateArticleHeading: document.getElementById('updateArticleHeading').checked
    };

    if (file) {
      payload.thumbnailFileName = file.name;
      payload.thumbnailDataBase64 = await readFileAsDataUrl(file);
    }

    const result = await apiPost('api/save-entry', payload);
    Object.assign(activeEntry, result.entry);
    if (activeCardEl) populateCard(activeCardEl, activeEntry);
    document.getElementById('thumbnailFile').value = '';
    document.getElementById('editThumbnail').value = activeEntry.thumbnail || '';
    updateThumbnailPreview();
    loadThumbnailAssets(activeEntry);
    if (result.articleHeadingUpdated) await renderArticle(activeEntry);

    const notes = [];
    if (result.thumbnailWritten) notes.push('thumbnail copied');
    if (result.articleHeadingUpdated) notes.push('article heading updated');
    setEditorStatus(notes.length ? `Saved (${notes.join(', ')}).` : 'Saved.', 'ok');
  } catch (error) {
    setEditorStatus(`Save failed: ${error.message}`, 'error');
  } finally {
    saveButton.disabled = false;
  }
}

async function removeActiveEntry() {
  if (!activeEntry) return;
  const archiveFolder = document.getElementById('archiveFolder').checked;
  const message = archiveFolder
    ? `Remove "${activeEntry.title}" from news.txt and move its folder to _removed_posts?`
    : `Remove "${activeEntry.title}" from news.txt?`;
  if (!confirm(message)) return;

  const removeButton = document.getElementById('removeButton');
  removeButton.disabled = true;
  setEditorStatus('Removing...');

  try {
    const removedEntry = activeEntry;
    await apiPost('api/remove-entry', { originalPath: removedEntry.path, archiveFolder });
    const index = newsEntries.indexOf(removedEntry);
    if (index >= 0) newsEntries.splice(index, 1);
    activeEntry = null;
    activeCardEl = null;
    renderCards(newsEntries, null);
    document.getElementById('editor').classList.add('hidden');
    document.getElementById('detail').innerHTML = '<div class="placeholder">Post removed.</div>';
  } catch (error) {
    setEditorStatus(`Remove failed: ${error.message}`, 'error');
  } finally {
    removeButton.disabled = false;
  }
}

document.getElementById('editForm').addEventListener('submit', saveActiveEntry);
document.getElementById('removeButton').addEventListener('click', removeActiveEntry);
document.getElementById('editThumbnail').addEventListener('input', updateThumbnailPreview);
document.getElementById('thumbnailFile').addEventListener('change', updateThumbnailPreview);
document.getElementById('scanThumbnailsButton').addEventListener('click', scanThumbnailAudit);
document.getElementById('closeCropPreviewButton').addEventListener('click', hideCropPreview);
document.getElementById('applyCropButton').addEventListener('click', applyActiveCrop);
document.getElementById('useAssetButton').addEventListener('click', () => {
  const value = document.getElementById('thumbnailAssets').value;
  if (!value) return;
  document.getElementById('editThumbnail').value = value;
  document.getElementById('thumbnailFile').value = '';
  updateThumbnailPreview();
});

(async () => {
  try {
    const res = await fetch('news.txt');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const entries = parseNewsIndex(text);
    renderCards(entries);
    scanThumbnailAudit();
  } catch (e) {
    document.getElementById('cards').innerHTML =
      `<div class="error">Failed to load news.txt: ${escapeHtml(e.message)}<br><br>` +
      `Serve this folder over HTTP (e.g. <code>python -m http.server</code>) so fetch() can read local files.</div>`;
  }
})();
</script>
</body>
</html>
